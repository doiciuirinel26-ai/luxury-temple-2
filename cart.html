<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VANTIS — Your Cart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            "colors": {
                "secondary": "#e9c349",
                "surface-container-high": "#282a2b",
                "surface-container": "#1e2020",
                "primary-container": "#0a0a0a",
                "outline": "#8e9192",
                "surface": "#121414",
                "on-surface": "#e2e2e2",
                "on-surface-variant": "#c4c7c7",
                "outline-variant": "#444748",
                "surface-container-lowest": "#0c0f0f",
                "background": "#121414"
            },
            "fontFamily": {
                "body-md": ["Inter"],
                "headline-md": ["Playfair Display"],
                "label-caps": ["Inter"]
            },
            "fontSize": {
                "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                "headline-md": ["32px", { "lineHeight": "40px", "fontWeight": "400" }],
                "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.15em", "fontWeight": "600" }]
            },
            "spacing": {
                "margin-desktop": "80px",
                "margin-mobile": "24px"
            }
        }
    }
}
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    .cart-item-img {
        filter: grayscale(60%);
        transition: filter 0.4s ease;
    }
    .cart-item-img:hover { filter: grayscale(0%); }
    .qty-btn {
        width: 32px; height: 32px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid rgba(233,195,73,0.25);
        color: #c4c7c7;
        transition: all 0.2s;
        cursor: pointer;
        background: transparent;
        font-size: 18px;
        line-height: 1;
        flex-shrink: 0;
    }
    .qty-btn:hover { border-color: #e9c349; color: #e9c349; background: rgba(233,195,73,0.05); }
</style>
</head>
<body class="bg-primary-container text-on-surface antialiased min-h-screen flex flex-col overflow-x-hidden">

<!-- Mobile Header -->
<nav class="md:hidden fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md border-b border-outline-variant/30 flex justify-between items-center px-6 py-4">
  <a href="/stitch_vantis_lateral_fire_experience/vantis_luxury_collections/code.html" class="text-on-surface-variant hover:text-secondary transition-colors">
    <span class="material-symbols-outlined">arrow_back</span>
  </a>
  <span class="text-secondary tracking-[0.2em] uppercase" style="font-family:'Playfair Display',serif;font-size:20px;font-weight:400">VANTIS</span>
  <span class="w-6"></span>
</nav>

<!-- Desktop Top Nav -->
<header class="hidden md:flex fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 justify-between items-center px-margin-desktop py-6">
    <nav class="flex gap-8">
        <a class="font-body-md text-body-md tracking-widest text-on-surface hover:text-secondary transition-colors duration-300" href="/stitch_vantis_lateral_fire_experience/vantis_luxury_collections/code.html">Collections</a>
        <a class="font-body-md text-body-md tracking-widest text-on-surface hover:text-secondary transition-colors duration-300" href="#">Bespoke</a>
        <a class="font-body-md text-body-md tracking-widest text-on-surface hover:text-secondary transition-colors duration-300" href="#">Heritage</a>
        <a class="font-body-md text-body-md tracking-widest text-on-surface hover:text-secondary transition-colors duration-300" href="#">Concierge</a>
    </nav>
    <a class="font-headline-md text-headline-md text-secondary tracking-[0.2em] uppercase absolute left-1/2 -translate-x-1/2" href="/">VANTIS</a>
    <div class="flex gap-4">
        <a href="/cart.html" class="relative text-secondary transition-all duration-300">
            <span class="material-symbols-outlined">shopping_bag</span>
            <span class="cart-badge absolute -top-1 -right-1 w-4 h-4 bg-secondary text-primary-container text-[9px] font-bold rounded-full items-center justify-center" style="display:none"></span>
        </a>
        <button class="text-on-surface hover:text-secondary transition-all duration-300">
            <span class="material-symbols-outlined">person</span>
        </button>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow pt-20 md:pt-28 pb-40 md:pb-16 px-margin-mobile md:px-margin-desktop">
    <div class="max-w-5xl mx-auto">
        <!-- Page Title -->
        <div class="pt-8 pb-10 border-b border-outline-variant/30">
            <p class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-2">VANTIS</p>
            <div class="flex items-baseline gap-3">
                <h1 style="font-family:'Playfair Display',serif;font-size:32px;font-weight:400" class="text-on-surface">Your Cart</h1>
                <span id="cart-count-label" class="text-on-surface-variant" style="font-size:14px;font-family:Inter,sans-serif"></span>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex-col items-center justify-center py-24 gap-6 text-center">
            <span class="material-symbols-outlined text-outline" style="font-size:64px;font-variation-settings:'FILL' 0,'wght' 200">shopping_bag</span>
            <p style="font-family:'Playfair Display',serif;font-size:22px;font-weight:400" class="text-on-surface-variant">Your cart is empty</p>
            <p class="font-label-caps text-label-caps text-outline tracking-widest">Add a piece from our collections to begin</p>
            <a href="/stitch_vantis_lateral_fire_experience/vantis_luxury_collections/code.html"
               class="mt-4 px-10 py-4 border border-secondary text-secondary tracking-widest uppercase hover:bg-secondary/10 transition-all duration-300 flex items-center gap-3"
               style="font-size:11px;font-family:Inter,sans-serif;font-weight:600;letter-spacing:0.2em">
                Explore Collections
                <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
            </a>
        </div>

        <!-- Cart Content -->
        <div id="cart-content" class="hidden">
            <div class="md:grid md:grid-cols-12 md:gap-16">
                <!-- Items List -->
                <div class="md:col-span-8 mt-2" id="cart-items-list"></div>

                <!-- Order Summary -->
                <div class="md:col-span-4 mt-10 md:mt-8">
                    <div class="border border-outline-variant/30 p-8 md:sticky md:top-32">
                        <h2 class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-8">Order Summary</h2>
                        <div class="flex flex-col gap-5 mb-8">
                            <div class="flex justify-between items-center" style="font-size:14px;font-family:Inter,sans-serif">
                                <span class="text-on-surface-variant">Subtotal</span>
                                <span id="subtotal-value" class="text-on-surface">€0</span>
                            </div>
                            <div class="flex justify-between items-center" style="font-size:14px;font-family:Inter,sans-serif">
                                <span class="text-on-surface-variant">Shipping</span>
                                <span class="text-secondary font-semibold" style="font-size:10px;font-family:Inter;font-weight:600;letter-spacing:0.12em">COMPLIMENTARY</span>
                            </div>
                            <div class="border-t border-outline-variant/30 pt-5 flex justify-between items-baseline">
                                <span class="font-label-caps text-label-caps text-on-surface tracking-widest uppercase">Total</span>
                                <span id="total-value" class="text-secondary" style="font-family:'Playfair Display',serif;font-size:24px;font-weight:400">€0</span>
                            </div>
                        </div>
                        <button id="checkout-btn-desktop"
                                class="w-full py-5 bg-secondary text-primary-container font-label-caps text-label-caps tracking-widest uppercase hover:bg-secondary/90 transition-all duration-300 flex items-center justify-center gap-3">
                            Proceed to Checkout
                            <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
                        </button>
                        <a href="/stitch_vantis_lateral_fire_experience/vantis_luxury_collections/code.html"
                           class="mt-4 w-full py-4 border border-outline-variant/50 text-on-surface-variant font-label-caps text-label-caps tracking-widest uppercase hover:border-secondary hover:text-secondary transition-all duration-300 flex items-center justify-center gap-3">
                            Continue Shopping
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Mobile Fixed Bottom Checkout Bar -->
<div id="mobile-checkout-bar" class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-surface-container border-t border-secondary/20 px-6 py-4 flex flex-col gap-3" style="display:none!important">
    <div class="flex justify-between items-baseline">
        <span class="font-label-caps text-label-caps text-on-surface-variant tracking-widest uppercase">Total</span>
        <span id="mobile-total" class="text-secondary" style="font-family:'Playfair Display',serif;font-size:22px;font-weight:400">€0</span>
    </div>
    <button id="checkout-btn-mobile"
            class="w-full py-4 bg-secondary text-primary-container font-label-caps text-label-caps tracking-widest uppercase flex items-center justify-center gap-2">
        Checkout
        <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
    </button>
</div>

<script>
const CART_KEY = 'vantis_cart';

function getCart() {
    try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; } catch { return []; }
}

function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function parsePrice(str) {
    return parseInt((str || '0').replace(/[^0-9]/g, '')) || 0;
}

function formatPrice(num) {
    if (num >= 1000) {
        return '€' + num.toLocaleString('en-US').replace(/,/g, '.');
    }
    return '€' + num;
}

function getTotal(cart) {
    return cart.reduce((sum, item) => sum + parsePrice(item.price) * item.quantity, 0);
}

function updateQuantity(id, delta) {
    const cart = getCart();
    const item = cart.find(i => i.id === id);
    if (!item) return;
    item.quantity = Math.max(1, item.quantity + delta);
    saveCart(cart);
    renderCart();
}

function removeItem(id) {
    saveCart(getCart().filter(i => i.id !== id));
    renderCart();
}

function renderCart() {
    const cart = getCart();
    const emptyState = document.getElementById('empty-state');
    const cartContent = document.getElementById('cart-content');
    const mobileBar = document.getElementById('mobile-checkout-bar');
    const countLabel = document.getElementById('cart-count-label');
    const itemsList = document.getElementById('cart-items-list');
    const subtotalEl = document.getElementById('subtotal-value');
    const totalEl = document.getElementById('total-value');
    const mobileTotalEl = document.getElementById('mobile-total');

    const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
    const total = getTotal(cart);
    const formattedTotal = formatPrice(total);

    // Badge
    document.querySelectorAll('.cart-badge').forEach(b => {
        if (totalItems > 0) { b.textContent = totalItems > 9 ? '9+' : totalItems; b.style.display = 'flex'; }
        else { b.style.display = 'none'; }
    });

    if (cart.length === 0) {
        emptyState.classList.remove('hidden');
        emptyState.style.display = 'flex';
        cartContent.classList.add('hidden');
        mobileBar.style.removeProperty('display');
        mobileBar.style.display = 'none';
        countLabel.textContent = '';
        return;
    }

    emptyState.classList.add('hidden');
    emptyState.style.display = 'none';
    cartContent.classList.remove('hidden');
    mobileBar.style.removeProperty('display');
    mobileBar.style.display = 'flex';
    mobileBar.style.flexDirection = 'column';

    countLabel.textContent = '(' + totalItems + ' ' + (totalItems === 1 ? 'item' : 'items') + ')';

    // Render items
    itemsList.innerHTML = '';
    cart.forEach(item => {
        const itemTotal = parsePrice(item.price) * item.quantity;
        const row = document.createElement('div');
        row.className = 'flex gap-4 py-7 border-b border-outline-variant/20';
        row.innerHTML =
            '<div class="flex-shrink-0 w-20 h-20 md:w-28 md:h-28 border border-outline-variant/20 overflow-hidden">' +
                '<img src="' + item.image + '" alt="' + item.name + '" class="w-full h-full object-cover cart-item-img"/>' +
            '</div>' +
            '<div class="flex-grow min-w-0">' +
                '<div class="flex justify-between items-start gap-2">' +
                    '<div>' +
                        '<p class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-1" style="font-size:9px">' + (item.categoryLabel || item.category) + '</p>' +
                        '<h3 class="text-on-surface mb-1" style="font-family:\'Playfair Display\',serif;font-size:17px;font-weight:400">' + item.name + '</h3>' +
                        '<p class="text-on-surface-variant" style="font-size:12px;font-family:Inter,sans-serif">' + item.subtitle + '</p>' +
                    '</div>' +
                    '<button onclick="removeItem(\'' + item.id + '\')" class="text-outline hover:text-secondary transition-colors flex-shrink-0 mt-0.5" title="Remove">' +
                        '<span class="material-symbols-outlined" style="font-size:20px">close</span>' +
                    '</button>' +
                '</div>' +
                '<div class="flex items-center justify-between mt-4 gap-4 flex-wrap">' +
                    '<div class="flex items-center">' +
                        '<button class="qty-btn" onclick="updateQuantity(\'' + item.id + '\', -1)">&#x2212;</button>' +
                        '<span class="w-10 text-center text-on-surface" style="font-size:14px;font-family:Inter,sans-serif">' + item.quantity + '</span>' +
                        '<button class="qty-btn" onclick="updateQuantity(\'' + item.id + '\', 1)">+</button>' +
                    '</div>' +
                    '<div class="text-right">' +
                        (item.quantity > 1 ? '<p class="text-on-surface-variant" style="font-size:11px;font-family:Inter">' + item.price + ' &times; ' + item.quantity + '</p>' : '') +
                        '<p class="text-secondary" style="font-family:\'Playfair Display\',serif;font-size:18px;font-weight:400">' + formatPrice(itemTotal) + '</p>' +
                    '</div>' +
                '</div>' +
            '</div>';
        itemsList.appendChild(row);
    });

    subtotalEl.textContent = formattedTotal;
    totalEl.textContent = formattedTotal;
    mobileTotalEl.textContent = formattedTotal;
}

function handleCheckout() {
    alert('Checkout flow coming soon.\n\nThank you for your interest in VANTIS.');
}

document.addEventListener('DOMContentLoaded', () => {
    renderCart();
    document.getElementById('checkout-btn-desktop').addEventListener('click', handleCheckout);
    document.getElementById('checkout-btn-mobile').addEventListener('click', handleCheckout);
});
</script>
</body>
</html>

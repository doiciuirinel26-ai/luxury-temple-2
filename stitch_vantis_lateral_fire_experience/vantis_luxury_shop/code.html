<script>
        // Particle System (Gold Stars Jumping)
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // Initial random spawn
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 1 + 0.5); // Upward movement
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.life = Math.random() * 100 + 50;
            }
            
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.life--;
                
                // Twinkle effect
                if (Math.random() < 0.05) {
                    this.opacity = Math.random() * 0.8 + 0.2;
                }
                
                if (this.life <= 0 || this.y < 0) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(233, 195, 73, ${this.opacity})`; // Gold color
                ctx.fill();
                
                // Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#e9c349';
            }
        }
        
        for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
        }
        
        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();

        // Fire Transition Logic (Lateral Swiping)
        let touchStartX = 0;
        let touchEndX = 0;
        const container = document.getElementById('swipe-container');
        const transitionEl = document.getElementById('fireTransition');
        
        function checkDirection() {
            const distance = touchEndX - touchStartX;
            if (Math.abs(distance) > 50) { // Minimum swipe distance
                triggerTransition();
            }
        }

        container.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        container.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            checkDirection();
        });

        // Add mouse support for testing on desktop
        let isDragging = false;
        container.addEventListener('mousedown', e => {
            isDragging = true;
            touchStartX = e.clientX;
        });

        container.addEventListener('mouseup', e => {
            if (!isDragging) return;
            isDragging = false;
            touchEndX = e.clientX;
            checkDirection();
        });

        function triggerTransition() {
            if (transitionEl.classList.contains('active')) return;
            
            transitionEl.style.transition = 'none';
            transitionEl.style.transform = 'translateX(100%)';
            
            // Force reflow
            void transitionEl.offsetWidth;
            
            transitionEl.style.transition = 'transform 0.6s cubic-bezier(0.77, 0, 0.175, 1)';
            transitionEl.classList.add('active');
            
            setTimeout(() => {
                transitionEl.classList.remove('active');
                transitionEl.style.transition = 'none';
                transitionEl.style.transform = 'translateX(100%)';
                // In a real app, this is where navigation to the next page would occur
                console.log('Transition complete - navigate to next page');
            }, 600);
        }
    </script>

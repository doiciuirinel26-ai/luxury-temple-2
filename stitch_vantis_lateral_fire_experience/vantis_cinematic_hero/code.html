<script>
        // Particle System
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = -(Math.random() * 1 + 0.5);
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.life = Math.random() * 100 + 50;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX; this.life--;
                if (Math.random() < 0.05) this.opacity = Math.random() * 0.8 + 0.2;
                if (this.life <= 0 || this.y < 0) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(233, 195, 73, ${this.opacity})`;
                ctx.fill();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#e9c349';
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // Swipe to navigate to Collections
        let touchStartX = 0;
        const container = document.getElementById('swipe-container');
        const transitionEl = document.getElementById('fireTransition');

        function triggerTransition() {
            if (transitionEl.classList.contains('active')) return;
            transitionEl.style.transition = 'none';
            transitionEl.style.transform = 'translateX(100%)';
            void transitionEl.offsetWidth;
            transitionEl.style.transition = 'transform 0.6s cubic-bezier(0.77, 0, 0.175, 1)';
            transitionEl.classList.add('active');
            setTimeout(() => {
                window.location.href = '/stitch_vantis_lateral_fire_experience/vantis_luxury_collections/code.html';
            }, 500);
        }

        container.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        container.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (diff > 50) triggerTransition();
        }, { passive: true });
    </script>

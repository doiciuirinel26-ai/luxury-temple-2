<script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.carousel-item');
            const indicators = document.querySelectorAll('.indicator');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            let currentIndex = 0;

            function updateCarousel() {
                items.forEach((item, index) => {
                    item.className = 'carousel-item absolute w-[80%] md:w-[45%] h-full max-w-[500px] rounded-xl overflow-hidden border bg-surface-container group cursor-pointer';
                    
                    if (index === currentIndex) {
                        item.classList.add('active');
                    } else if (index === (currentIndex - 1 + items.length) % items.length) {
                        item.classList.add('prev');
                    } else if (index === (currentIndex + 1) % items.length) {
                        item.classList.add('next');
                    } else {
                        // Hide others if more than 3
                        item.style.opacity = '0';
                        item.style.pointerEvents = 'none';
                    }
                });

                indicators.forEach((ind, index) => {
                    if(index === currentIndex) {
                        ind.classList.remove('bg-outline');
                        ind.classList.add('bg-secondary', 'shadow-[0_0_8px_rgba(233,195,73,0.8)]');
                    } else {
                        ind.classList.remove('bg-secondary', 'shadow-[0_0_8px_rgba(233,195,73,0.8)]');
                        ind.classList.add('bg-outline');
                    }
                });
            }

            nextBtn.addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % items.length;
                updateCarousel();
            });

            prevBtn.addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + items.length) % items.length;
                updateCarousel();
            });

            // Click on items to bring to center
            items.forEach(item => {
                item.addEventListener('click', function() {
                    if(!this.classList.contains('active')) {
                        currentIndex = parseInt(this.getAttribute('data-index'));
                        updateCarousel();
                    }
                });
            });

            // Swipe functionality for mobile
            let touchstartX = 0;
            let touchendX = 0;
            const slider = document.querySelector('.carousel-container');

            function handleGesture() {
                if (touchendX < touchstartX - 50) {
                    // Swipe Left
                    currentIndex = (currentIndex + 1) % items.length;
                    updateCarousel();
                }
                
                if (touchendX > touchstartX + 50) {
                    // Swipe Right
                    currentIndex = (currentIndex - 1 + items.length) % items.length;
                    updateCarousel();
                }
            }

            slider.addEventListener('touchstart', e => {
                touchstartX = e.changedTouches[0].screenX;
            });

            slider.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX;
                handleGesture();
            });
        });
    </script>
